<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2b2b2b"/>
      <stop offset="100%" style="stop-color:#171717"/>
    </linearGradient>
    <linearGradient id="activeTab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E58A6A"/>
      <stop offset="100%" style="stop-color:#C76343"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Terminal "window" inner -->
  <rect x="8" y="8" width="112" height="112" rx="14" fill="#1d1d1d" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Tab strip background -->
  <rect x="8" y="8" width="112" height="28" rx="14" fill="#0e0e0e"/>
  <rect x="8" y="22" width="112" height="14" fill="#0e0e0e"/>

  <!-- Tab 1 (active, Claude orange) -->
  <rect x="14" y="13" width="32" height="22" rx="5" fill="url(#activeTab)"/>
  <text x="30" y="29" text-anchor="middle" fill="#ffffff"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Mono', Menlo, monospace"
        font-size="14" font-weight="700">1</text>

  <!-- Tab 2 (muted) -->
  <rect x="50" y="13" width="32" height="22" rx="5" fill="#2e2e2e"/>
  <text x="66" y="29" text-anchor="middle" fill="#8a8a8a"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Mono', Menlo, monospace"
        font-size="14" font-weight="700">2</text>

  <!-- Tab 3 (muted) -->
  <rect x="86" y="13" width="32" height="22" rx="5" fill="#2e2e2e"/>
  <text x="102" y="29" text-anchor="middle" fill="#8a8a8a"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Mono', Menlo, monospace"
        font-size="14" font-weight="700">3</text>

  <!-- Prompt > -->
  <text x="22" y="86" fill="#E58A6A"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Mono', Menlo, monospace"
        font-size="36" font-weight="700">&gt;</text>

  <!-- Blinking cursor block -->
  <rect x="50" y="64" width="16" height="24" rx="2" fill="#E58A6A"/>

  <!-- A couple of dimmed "history" lines -->
  <rect x="22" y="98" width="56" height="3.5" rx="1.5" fill="#4a4a4a"/>
  <rect x="22" y="107" width="74" height="3.5" rx="1.5" fill="#4a4a4a"/>
</svg>
